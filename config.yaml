proxy-groups:
  # ===== 入口自动选择 =====
  - name: 🚪入口选择
    type: url-test
    proxies:
      - Lv3 香港 01 [2.0]
      - JMS-1272316
    url: http://www.gstatic.com/generate_204
    interval: 300

  # ===== 出口 =====
  - name: 🌍 出口选择
    type: select
    proxies:
      - 尼日利亚-01

  # ===== 链式代理 =====
  - name: 🔗 中继代理
    type: relay
    proxies:
      - 🚪入口选择
      - 🌍 出口选择

  # ===== 普通代理 =====
  - name: 🌐 普通代理
    type: select
    proxies:
      - 🚪入口选择
      - DIRECT

  # ===== 总控制 =====
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🔗 中继代理
      - 🌐 普通代理
      - DIRECT

rules:
  # ===== 指定走链式代理 =====
  - DOMAIN-SUFFIX,ipinfo.io,🔗 中继代理
  - DOMAIN-SUFFIX,sumsub.com,🔗 中继代理

  # ===== 常见需要国外出口的网站 =====
  - DOMAIN-SUFFIX,paypal.com,🔗 中继代理
  - DOMAIN-SUFFIX,wise.com,🔗 中继代理
  - DOMAIN-SUFFIX,binance.com,🔗 中继代理
  - DOMAIN-SUFFIX,okx.com,🔗 中继代理

  # ===== 其余走普通代理 =====
  - MATCH,🌐 普通代理
