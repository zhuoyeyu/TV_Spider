mixed-port: 7890
allow-lan: true
mode: rule
log-level: info

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fallback:
    - 8.8.4.4
    - 1.0.0.1
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

proxies:
  # ===== Trojan 入口 =====
  - name: Lv3 香港 01 [2.0]
    type: trojan
    server: sdv3-hk.kunlun04dns.com
    port: 6601
    password: 51c02633-59a0-4eda-ada1-e1dec014c8c4
    skip-cert-verify: true

  # ===== Shadowsocks 入口 =====
  - name: JMS-1272316
    type: ss
    server: c17s1.portablesubmarines.com
    port: 11336
    cipher: aes-256-gcm
    password: euzrM8pd8wYmH9vm

  # ===== SOCKS5 出口 =====
  - name: 尼日利亚-01
    type: socks5
